<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>image gallery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="gallery">
       <div class="container"><img src="image1.jpg" alt="" onclick="openLightbox(0)"></div>
       <div class="container"><img src="image2.jpg" alt="" onclick="openLightbox(1)"></div>
       <div class="container"><img src="image3.jpg" alt="" onclick="openLightbox(2)"></div>
       <div class="container"><img src="image4.jpg" alt="" onclick="openLightbox(3)"></div>
       <div class="container"><img src="image5.jpg" alt="" onclick="openLightbox(4)"></div>
       <div class="container"><img src="image6.jpg" alt="" onclick="openLightbox(5)"></div>
       <div class="container"><img src="image7.jpg" alt="" onclick="openLightbox(6)"></div>
       <div class="container"><img src="image8.jpg" alt="" onclick="openLightbox(7)"></div>
       </div>
       <div id="lightbox">
        <span class="close" onclick="closeLightbox()">&times;</span>

        <button class="prev" onclick="changeImage(-1)"><</button>

        <img id="lightbox-img">

        <button class="next" onclick="changeImage(1)">></button>
    </div>

    <script src="script.js"></script>
</body>
</html>
